name: Smoke

on:
  push:
  pull_request:

jobs:
  package-check:
    name: package-check-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt

      - name: Check package structure
        run: python scripts/check_student_package.py --clean

      - name: Compile student package
        run: python -m compileall gui_controls.py terminal_keys.py labs robots simulation scripts tools

      - name: Run lab help smoke checks
        shell: bash
        run: |
          (cd labs/lab01_forward_kinematics && python interface.py --help)
          (cd labs/lab02_jacobian_inverse_kinematics && python interface.py --help)
